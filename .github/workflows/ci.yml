name: CI

on:
  push:
    branches: [main, "release/*"]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies (rewrite SDK pin to https for CI)
        run: |
          sed 's|git+ssh://git@github.com/|git+https://github.com/|g' requirements.txt > /tmp/requirements-ci.txt
          pip install -r /tmp/requirements-ci.txt
          pip install -r requirements-runtime.txt
          pip install pytest pytest-asyncio
      - name: check-env-example
        run: platform-sdk check-env-example --config-dir config --env-example .env.example

      - name: no-adhoc-httpx-async-client
        run: |
          if grep -rn --include='*.py' 'httpx\.AsyncClient(' src/; then
            echo "ERROR: direct httpx.AsyncClient construction found in src/."
            echo "Use platform_sdk.http.make_internal_http_client instead."
            exit 1
          fi

      - name: Run tests
        run: pytest tests -v
